    <script>
        const CLIENT_ID = '47228502594-hk66ecflb2s5iq02rim3o8j0j87d2p3c.apps.googleusercontent.com';
        const SPREADSHEET_ID = '1-Sv1ci9aQ80d5U42lTa2_eWfDCpsp2HESIOpHkOaxQQ'; // 在庫データ（調達管理と同じ）

        let tokenClient;

        let viewMode = 'group'; // 表示モード: 'group'（グループ表示） or 'flat'（フラット表示）

        // 複数人利用対応

        let lastDataHash = ''; // データ変更検知用
        let lastArchiveHash = ''; // アーカイブシート変更検知用
        let lastSaveTime = 0; // 最後に保存した時刻
        
        // トークン自動リフレッシュ
        let tokenRefreshTimer = null;

        const TOKEN_REFRESH_MINUTES = 50; // 50分ごとにリフレッシュ（有効期限60分の前）

        // 案件番号ヘルパー関数
        // 表示用フォーマット（例: AD-1681）
        function formatProjectNumber(prefix, number) {
            if (!prefix && !number) return '';
            return `${prefix || 'AD'}-${number || 0}`;
        }

        // 案件番号文字列からprefix/numberを分解
        function parseProjectNumberString(str) {
            if (!str) return { prefix: '', number: '' };
            const match = str.match(/^([A-Z]+)-?(\d+)$/i);
            if (match) {
                return { prefix: match[1].toUpperCase(), number: match[2] };
            }
            // 数字のみの場合
            const numMatch = str.match(/^(\d+)$/);
            if (numMatch) {
                return { prefix: 'AD', number: numMatch[1] };
            }
            return { prefix: '', number: '' };
        }

        // ステータス正規化（後方互換：発送済・引渡済 → 出庫済、不具合 → 不良品）
        function normalizeStatus(status) {
            if (status === '発送済' || status === '引渡済') {
                return '出庫済';
            }
            if (status === '不具合') {
                return '不良品';
            }
            return status;
        }

        // ダークモード初期化
        if (isDarkMode) {
            document.documentElement.classList.add('dark');
        }

        function toggleDarkMode() {
            isDarkMode = !isDarkMode;
            localStorage.setItem('darkMode', isDarkMode);
            document.documentElement.classList.toggle('dark', isDarkMode);
            renderMain();
        }

        // HTMLエスケープ（グローバル）
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ステータス色を返す（グローバル）
        function getStatusColor(status) {
            switch(status) {
                case '入庫待ち': return 'bg-amber-100 text-amber-700 dark:bg-amber-900/50 dark:text-amber-300';
                case '検品待ち': return 'bg-orange-100 text-orange-700 dark:bg-orange-900/50 dark:text-orange-300';
                case '在庫中': return 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/50 dark:text-emerald-300';
                case '引当済': return 'bg-cyan-100 text-cyan-700 dark:bg-cyan-900/50 dark:text-cyan-300';
                case '出庫済': return 'bg-blue-100 text-blue-700 dark:bg-blue-900/50 dark:text-blue-300';
                case '社内使用': return 'bg-purple-100 text-purple-700 dark:bg-purple-900/50 dark:text-purple-300';
                case '不良品': return 'bg-red-100 text-red-700 dark:bg-red-900/50 dark:text-red-300';
                case '廃棄': return 'bg-slate-200 text-slate-600 dark:bg-slate-600 dark:text-slate-300';
                default: return 'bg-slate-100 text-slate-700 dark:bg-slate-700 dark:text-slate-300';
            }
        }

        // 種別リスト
        const CATEGORIES = [
            'マルチディスプレイ',
            '屋外',
            '屋外LED',
            '屋内',
            '屋内LED',
            'LEDコントローラー',

            'マトリクス',
            'メディアプレーヤー',
            'OPS',
            'スタンド/金具',
            '周辺機器',
            'サービス'
        ];

        // ステータスリスト
        const STATUSES = ['入庫待ち', '検品待ち', '在庫中', '引当済', '出庫済', '社内使用', '不良品', '廃棄'];

        // 保管場所リスト
        const LOCATIONS = ['蓮田', '東京', '大阪'];

        // 現在のフィルタ
        let currentFilters = {
            category: '',
            status: '',
            search: '',
            sort: 'orderDate-desc',
            shelfNo: '',
            receiveDateFrom: '',
            receiveDateTo: '',
            shipProject: '',
            costRange: '',
            noShelf: false,
            location: ''
        };

        // 詳細フィルタ開閉状態
        let showDetailFilters = false;

        // 折りたたみ状態（案件番号ごと）- localStorageで保持
        let expandedProjects = JSON.parse(localStorage.getItem('inventoryExpandedProjects') || '{}');

        // 棚番リスト（1〜30）
        const SHELF_NUMBERS = Array.from({length: 30}, (_, i) => String(i + 1));
        
        // 使用中の棚番を取得（使用数順）
        function getUsedShelfNumbers() {
            const counts = {};
            inventory.forEach(item => {
                if (item.shelfNo && item.status === '在庫中') {
                    counts[item.shelfNo] = (counts[item.shelfNo] || 0) + 1;
                }
            });
            // 使用数順にソート
            return Object.entries(counts)
                .sort((a, b) => b[1] - a[1])
                .map(([shelf, count]) => ({ shelf, count }));
        }
        
        // 棚番選択肢を生成（使用中を優先表示）
        function getShelfOptions(selectedValue = '') {
            const usedShelves = getUsedShelfNumbers();
            const usedShelfSet = new Set(usedShelves.map(u => u.shelf));
            
            let options = '<option value="">未設定</option>';
            
            // 使用中の棚番（件数付き）
            if (usedShelves.length > 0) {
                options += '<optgroup label="使用中">';
                usedShelves.forEach(({ shelf, count }) => {
                    options += `<option value="${shelf}" ${selectedValue === shelf ? 'selected' : ''}>${shelf} (${count}件)</option>`;
                });
                options += '</optgroup>';
            }
            
            // 空いている棚番
            const emptyShelves = SHELF_NUMBERS.filter(n => !usedShelfSet.has(n));
            if (emptyShelves.length > 0) {
                options += '<optgroup label="空き">';
                emptyShelves.forEach(shelf => {
                    options += `<option value="${shelf}" ${selectedValue === shelf ? 'selected' : ''}>${shelf}</option>`;
                });
                options += '</optgroup>';
            }
            
            return options;
        }

        // 原価帯リスト
        const COST_RANGES = [
            { value: '', label: 'すべて' },
            { value: '0-50000', label: '5万円未満' },
            { value: '50000-100000', label: '5〜10万円' },
            { value: '100000-300000', label: '10〜30万円' },
            { value: '300000-', label: '30万円以上' }
        ];

        function gapiLoaded() {
            gapi.load('client', initializeGapiClient);
        }

        async function initializeGapiClient() {
            await gapi.client.init({
                discoveryDocs: [
                    'https://sheets.googleapis.com/$discovery/rest?version=v4',
                    'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'
                ],
            });
            gapiInited = true;
            maybeEnableButtons();
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (resp) => {
                    if (resp.error !== undefined) {
                        throw (resp);
                    }
                    accessToken = resp.access_token;
                    sessionStorage.setItem('googleAccessToken', accessToken);
                    
                    // トークン有効期限を記録（デフォルト60分）
                    const expiresIn = resp.expires_in || 3600;
                    tokenExpiresAt = Date.now() + (expiresIn * 1000);
                    sessionStorage.setItem('tokenExpiresAt', tokenExpiresAt.toString());
                    
                    // 自動リフレッシュタイマー設定
                    startTokenRefreshTimer();
                    
                    loadData();
                },
            });
            gisInited = true;
            maybeEnableButtons();
        }
        
        // トークン自動リフレッシュタイマー
        function startTokenRefreshTimer() {
            // 既存のタイマーをクリア
            if (tokenRefreshTimer) {
                clearTimeout(tokenRefreshTimer);
            }
            
            // 50分後にリフレッシュ
            tokenRefreshTimer = setTimeout(() => {
                console.log('🔄 トークン自動リフレッシュ中...');
                silentTokenRefresh();
            }, TOKEN_REFRESH_MINUTES * 60 * 1000);
            
            console.log(`⏰ トークンリフレッシュ予定: ${TOKEN_REFRESH_MINUTES}分後`);
        }
        
        // サイレントリフレッシュ（ユーザーに見えない形で更新）
        function silentTokenRefresh() {
            if (!tokenClient) return;
            
            tokenClient.callback = (resp) => {
                if (resp.error !== undefined) {
                    console.error('トークンリフレッシュ失敗:', resp.error);
                    showConnectionStatus('warning');
                    return;
                }
                accessToken = resp.access_token;
                sessionStorage.setItem('googleAccessToken', accessToken);
                
                const expiresIn = resp.expires_in || 3600;
                tokenExpiresAt = Date.now() + (expiresIn * 1000);
                sessionStorage.setItem('tokenExpiresAt', tokenExpiresAt.toString());
                
                console.log('✅ トークンリフレッシュ成功');
                showConnectionStatus('connected');
                startTokenRefreshTimer();
            };
            
            tokenClient.requestAccessToken({ prompt: '' });
        }

        // === 認証トークン自動リトライ（B: 事後リカバリ）===
        // 401が出たらトークンを取り直してから処理をリトライする。
        // 使い方: await withAuthRetry(() => gapi.client.sheets.spreadsheets.values.get({...}))
        async function withAuthRetry(operation, maxRetries = 1) {
            let lastError;
            for (let attempt = 0; attempt <= maxRetries; attempt++) {
                try {
                    return await operation();
                } catch (err) {
                    lastError = err;
                    const status = err && (err.status || (err.result && err.result.error && err.result.error.code));
                    if (status !== 401 || attempt >= maxRetries) {
                        throw err;
                    }
                    console.warn('[認証] 401検出、トークンを再取得してリトライします');
                    await refreshTokenSilentlyPromise();
                }
            }
            throw lastError;
        }

        // silentTokenRefreshをPromise化（withAuthRetryから呼ぶ用）
        function refreshTokenSilentlyPromise() {
            return new Promise((resolve, reject) => {
                if (!tokenClient) {
                    reject(new Error('tokenClient未初期化'));
                    return;
                }
                tokenClient.callback = (resp) => {
                    if (resp.error) {
                        reject(new Error(resp.error));
                        return;
                    }
                    accessToken = resp.access_token;
                    sessionStorage.setItem('googleAccessToken', accessToken);
                    gapi.client.setToken({ access_token: accessToken });
                    const expiresIn = resp.expires_in || 3600;
                    tokenExpiresAt = Date.now() + (expiresIn * 1000);
                    sessionStorage.setItem('tokenExpiresAt', tokenExpiresAt.toString());
                    startTokenRefreshTimer();
                    console.log('[認証] リトライ用トークン取得 成功');
                    resolve();
                };
                tokenClient.requestAccessToken({ prompt: '' });
            });
        }
        
        // 接続状態表示
        function showConnectionStatus(status) {
            const indicator = document.getElementById('connectionIndicator');
            if (!indicator) return;
            
            if (status === 'connected') {
                indicator.className = 'w-2 h-2 rounded-full bg-green-400';
                indicator.title = '接続中';
            } else if (status === 'warning') {
                indicator.className = 'w-2 h-2 rounded-full bg-yellow-400 animate-pulse';
                indicator.title = '再接続が必要な可能性があります';
            } else {
                indicator.className = 'w-2 h-2 rounded-full bg-red-400';
                indicator.title = '接続エラー';
            }
        }
        
        // API呼び出しラッパー（エラー時に自動再認証）
        async function apiCallWithRetry(apiCall) {
            try {
                return await apiCall();
            } catch (err) {
                if (err.status === 401 || err.status === 403) {
                    console.log('🔑 認証エラー、再認証を試行...');
                    
                    // 再認証を試みる
                    return new Promise((resolve, reject) => {
                        tokenClient.callback = async (resp) => {
                            if (resp.error) {
                                showConnectionStatus('error');
                                reject(new Error('再認証に失敗しました。ページを更新してください。'));
                                return;
                            }
                            accessToken = resp.access_token;
                            sessionStorage.setItem('googleAccessToken', accessToken);
                            gapi.client.setToken({ access_token: accessToken });
                            
                            tokenExpiresAt = Date.now() + 3600000;
                            sessionStorage.setItem('tokenExpiresAt', tokenExpiresAt.toString());
                            startTokenRefreshTimer();
                            showConnectionStatus('connected');
                            
                            try {
                                const result = await apiCall();
                                resolve(result);
                            } catch (retryErr) {
                                reject(retryErr);
                            }
                        };
                        tokenClient.requestAccessToken({ prompt: '' });
                    });
                }
                throw err;
            }
        }

        function maybeEnableButtons() {
            if (gapiInited && gisInited) {
                const savedToken = sessionStorage.getItem('googleAccessToken');
                const savedExpiry = sessionStorage.getItem('tokenExpiresAt');
                
                // トークンがあり、有効期限内かチェック
                if (savedToken && savedExpiry) {
                    const expiresAt = parseInt(savedExpiry);
                    const now = Date.now();
                    
                    // 有効期限まで5分以上ある場合のみ使用
                    if (expiresAt > now + 300000) {
                        accessToken = savedToken;
                        tokenExpiresAt = expiresAt;
                        gapi.client.setToken({ access_token: accessToken });
                        startTokenRefreshTimer();
                        loadData();
                        return;
                    } else {
                        // 期限切れ間近または期限切れ → クリア
                        console.log('⚠️ トークン期限切れ、再ログインが必要');
                        sessionStorage.removeItem('googleAccessToken');
                        sessionStorage.removeItem('tokenExpiresAt');
                    }
                }
                renderSignIn();
            }
        }

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) {
                    throw (resp);
                }
                accessToken = resp.access_token;
                sessionStorage.setItem('googleAccessToken', accessToken);
                
                // トークン有効期限を記録
                const expiresIn = resp.expires_in || 3600;
                tokenExpiresAt = Date.now() + (expiresIn * 1000);
                sessionStorage.setItem('tokenExpiresAt', tokenExpiresAt.toString());
                
                // 自動リフレッシュタイマー設定
                startTokenRefreshTimer();
                
                await loadData();
            };

            if (accessToken === null) {
                tokenClient.requestAccessToken({ prompt: 'consent' });
            } else {
                tokenClient.requestAccessToken({ prompt: '' });
            }
        }

        function handleSignoutClick() {
            accessToken = null;
            sessionStorage.removeItem('googleAccessToken');
            sessionStorage.removeItem('tokenExpiresAt');
            gapi.client.setToken(null);
            
            // タイマーをクリア
            if (tokenRefreshTimer) {
                clearTimeout(tokenRefreshTimer);
                tokenRefreshTimer = null;
            }
            
            renderSignIn();
        }

        async function findFolderUrl(projectNumber) {
            if (folderCache[projectNumber]) {
                return folderCache[projectNumber];
            }
            
            try {
                const response = await gapi.client.drive.files.list({
                    q: `name = '${projectNumber}' and '${PARENT_FOLDER_ID}' in parents and mimeType = 'application/vnd.google-apps.folder' and trashed = false`,
                    fields: 'files(id, name, webViewLink)',
                    pageSize: 1,
                    supportsAllDrives: true,
                    includeItemsFromAllDrives: true,
                    corpora: 'allDrives'
                });
                
                const files = response.result.files;
                if (files && files.length > 0) {
                    const url = files[0].webViewLink;
                    folderCache[projectNumber] = url;
                    return url;
                }
                return null;
            } catch (error) {
                console.error('フォルダ検索エラー:', error);
                return null;
            }
        }

        async function loadFolderUrls() {
            const projectNumbers = [...new Set(inventory.map(i => formatProjectNumber(i.orderPrefix, i.orderNumber)).filter(p => p && p !== '未設定' && p !== '-0'))];
            for (const projectNumber of projectNumbers) {
                if (!folderCache[projectNumber]) {
                    await findFolderUrl(projectNumber);
                }
            }
            renderMain();
        }

        // 在庫IDの重複を修復
        async function repairDuplicateIds() {
            if (!confirm('在庫シートのIDの重複を修復します。\n\n重複しているIDを新しい一意のIDに置き換えます。\n\n続行しますか？')) {
                return;
            }
            
            try {
                showStatus('ID重複をチェック中...');
                
                // 在庫データを取得
                const response = await gapi.client.sheets.spreadsheets.values.get({
                    spreadsheetId: SPREADSHEET_ID,
                    range: '在庫!A2:A',
                });
                const rows = response.result.values || [];
                
                // 重複をチェック
                const idCounts = {};
                rows.forEach((row, idx) => {
                    const id = row[0] || '';
                    if (!idCounts[id]) {
                        idCounts[id] = [];
                    }
                    idCounts[id].push(idx);
                });
                
                // 重複しているIDを修復
                const updates = [];
                let repairCount = 0;
                
                Object.keys(idCounts).forEach(id => {
                    const indices = idCounts[id];
                    if (indices.length > 1) {
                        // 最初の1つは残し、残りは新しいIDを付与
                        for (let i = 1; i < indices.length; i++) {
                            const rowNum = indices[i] + 2; // 実際の行番号
                            const newId = Date.now().toString() + '-' + rowNum + '-' + i;
                            updates.push({
                                range: `在庫!A${rowNum}`,
                                values: [[newId]]
                            });
                            repairCount++;
                        }
                    }
                });
                
                console.log('修復対象:', repairCount, '件');
                
                if (updates.length > 0) {
                    showStatus(`${repairCount}件のIDを修復中...`);
                    
                    // バッチで更新
                    await gapi.client.sheets.spreadsheets.values.batchUpdate({
                        spreadsheetId: SPREADSHEET_ID,
                        resource: {
                            valueInputOption: 'RAW',
                            data: updates
                        }
                    });
                    
                    showStatus(`✅ ${repairCount}件のIDを修復しました`);
                    alert(`${repairCount}件の重複IDを修復しました。\n\nページをリロードしてください。`);
                    
                    // データを再読み込み
                    await loadData();
                } else {
                    showStatus('重複IDはありません');
                    alert('重複しているIDはありませんでした。');
                }
            } catch (error) {
                console.error('ID修復エラー:', error);
                showStatus('ID修復エラー: ' + error.message);
                alert('ID修復に失敗しました: ' + error.message);
            }
        }

            try {
                showStatus('データ読み込み中...');
                dataLoaded = false; // 読み込み開始時はロック（成功時にtrueへ）
                
                // 在庫シートを読み込み
                try {
                    const inventoryResponse = await gapi.client.sheets.spreadsheets.values.get({
                        spreadsheetId: SPREADSHEET_ID,
                        range: '在庫!A2:Q',
                    });
                    const inventoryRows = inventoryResponse.result.values || [];

                        // IDがない場合は自動生成
                        const itemId = row[0] || `auto-${Date.now()}-${idx}`;
                        
                        // 後方互換: 古い形式(orderProject=AD-1234)と新しい形式(prefix + number)の両方に対応
                        let orderPrefix = row[4] || '';
                        let orderNumber = row[5] || '';
                        let shipPrefix = row[10] || '';
                        let shipNumber = row[11] || '';
                        
                        // 古い形式の場合（row[4]が"AD-1234"のような形式）
                        if (row[4] && row[4].match(/^[A-Z]+-\d+$/i)) {
                            const parsed = parseProjectNumberString(row[4]);
                            orderPrefix = parsed.prefix;
                            orderNumber = parsed.number;
                            // 古い形式の場合、カラム位置をシフト
                            return {
                                id: itemId,
                                serial: row[1] || '',
                                category: row[2] || '',
                                productName: row[3] || '',
                                orderPrefix: orderPrefix,
                                orderNumber: orderNumber,
                                orderDate: row[5] || '',
                                receiveDate: row[6] || '',
                                status: normalizeStatus(row[7] || '入庫待ち'),
                                shipDate: row[8] || '',
                                shipPrefix: '',
                                shipNumber: '',
                                shipProject: row[9] || '', // 古い形式の出庫先

                            category: row[2] || '',
                            productName: row[3] || '',
                            orderPrefix: row[4] || '',
                            orderNumber: row[5] || '',
                            orderDate: row[6] || '',
                            receiveDate: row[7] || '',
                            status: normalizeStatus(row[8] || '入庫待ち'),

        // 自動リロード機能
        function startAutoReload() {
            if (autoReloadInterval) {
                clearInterval(autoReloadInterval);
            }
            if (autoReloadEnabled) {
                autoReloadInterval = setInterval(async () => {
                    await silentReload();
                }, AUTO_RELOAD_SECONDS * 1000);
            }
        }

        function stopAutoReload() {
            if (autoReloadInterval) {
                clearInterval(autoReloadInterval);
                autoReloadInterval = null;
            }
        }

        function toggleAutoReload() {
            autoReloadEnabled = !autoReloadEnabled;
            if (autoReloadEnabled) {
                startAutoReload();
            } else {
                stopAutoReload();
            }
            renderMain();
        }

        // サイレントリロード（UIを更新せずにデータ取得、変更があれば通知）
        async function silentReload() {
            // 保存直後5秒間はスキップ
            if (Date.now() - lastSaveTime < 5000) {
                console.log('保存直後のため自動同期スキップ');
                return;
            }

            // モーダルが開いてる間は同期スキップ（編集中のデータが上書きされるのを防ぐ）
            // モーダルは id 末尾が "Modal" で、body直下のz-50オーバーレイとして存在
            const openModal = document.querySelector('[id$="Modal"]');
            if (openModal) {
                console.log('モーダル表示中のため自動同期スキップ:', openModal.id);
                return;
            }
            
            try {
                const response = await gapi.client.sheets.spreadsheets.values.get({
                    spreadsheetId: SPREADSHEET_ID,
                    range: '在庫!A2:Q',
                });
                const rows = response.result.values || [];
                const newHash = JSON.stringify(rows);
                
                if (lastDataHash && newHash !== lastDataHash) {
                    // データが変更された
                    showSyncNotification();
                    inventory = rows.map(row => {
                        // 後方互換
                        if (row[4] && row[4].match(/^[A-Z]+-\d+$/i)) {
                            const parsed = parseProjectNumberString(row[4]);
                            return {
                                id: row[0] || '',
                                serial: row[1] || '',
                                category: row[2] || '',
                                productName: row[3] || '',
                                orderPrefix: parsed.prefix,
                                orderNumber: parsed.number,
                                orderDate: row[5] || '',
                                receiveDate: row[6] || '',
                                status: normalizeStatus(row[7] || '入庫待ち'),
                                shipDate: row[8] || '',
                                shipPrefix: '',
                                shipNumber: '',
                                costJPY: row[10] || '',
                                note: row[11] || '',
                                shelfNo: row[12] || '',
                                location: row[13] || '',
                                supplierId: row[14] || ''
                            };
                        }
                        return {
                            id: row[0] || '',
                            serial: row[1] || '',
                            category: row[2] || '',
                            productName: row[3] || '',
                            orderPrefix: row[4] || '',
                            orderNumber: row[5] || '',
                            orderDate: row[6] || '',
                            receiveDate: row[7] || '',
                            status: normalizeStatus(row[8] || '入庫待ち'),
                            shipDate: row[9] || '',
                            shipPrefix: row[10] || '',
                            shipNumber: row[11] || '',
                            costJPY: row[12] || '',
                            note: row[13] || '',
                            shelfNo: row[14] || '',
                            location: row[15] || '',
                            supplierId: row[16] || ''
                        };
                    });
                    lastUpdated = new Date();
                    renderMain();
                }
                lastDataHash = newHash;
            } catch (err) {
                console.log('自動同期エラー:', err);
            }
        }

        // 同期通知を表示
        function showSyncNotification() {
            const notification = document.createElement('div');
            notification.className = 'fixed top-4 right-4 bg-blue-600 text-white px-4 py-3 rounded-lg shadow-lg z-50 flex items-center gap-2 animate-pulse';
            notification.innerHTML = `
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                <span>データが更新されました</span>
            `;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        // 製品マスタ読み込み
        async function loadProductMaster() {
            const sheetNames = ['LCD', 'LED', 'LED_others', 'matrix-switcher', 'TVwall_controller', 'STUDIA', 'e-board_stand', 'OPS', 'dongle', 'player'];
            productMaster = [];
            
            for (const sheetName of sheetNames) {
                try {
                    const response = await gapi.client.sheets.spreadsheets.values.get({
                        spreadsheetId: PRODUCT_MASTER_ID,
                        range: `${sheetName}!A1:BZ`,
                    });
                    const rows = response.result.values || [];
                    if (rows.length < 2) continue;
                    
                    const headers = rows[0];
                    const dataRows = rows.slice(1);
                    
                    // カラムインデックスを取得
                    const colIndex = {};
                    headers.forEach((h, i) => colIndex[h] = i);
                    
                    dataRows.forEach(row => {
                        // is_active チェック（Boolean true / 文字列 'TRUE'/'true' / 1 など、真偽表現の揺れを広く許容）
                        const isActive = row[colIndex['is_active']];
                        const isActiveOk = (isActive === true) ||
                                           (typeof isActive === 'string' && isActive.toUpperCase() === 'TRUE') ||
                                           (isActive === 1 || isActive === '1');
                        if (!isActiveOk) return;
                        
                        // type から category を決定（旧形式対応）
                        const type = row[colIndex['type']] || '';
                        // 新形式の category カラムがあればそれを使用、なければ type から変換
                        let category = row[colIndex['category']] || '';
                        if (!category) {
                            if (type === 'ID') category = '屋内';
                            else if (type === 'OD') category = '屋外';
                            else if (type === 'MD') category = 'マルチディスプレイ';
                            else category = sheetName;
                        }
                        
                        // 新旧両方のカラム名に対応
                        productMaster.push({
                            id: row[colIndex['id']] || row[colIndex['ID']] || '',
                            pn: row[colIndex['pn']] || row[colIndex['PN']] || '',
                            pn_full: row[colIndex['pn_full']] || row[colIndex['PN2']] || '',
                            type: type,
                            category: category,
                            supplier: row[colIndex['supplier']] || row[colIndex['suplier']] || '',
                            inch: row[colIndex['inch']] || '',
                            color: row[colIndex['color_body']] || '',
                            resolution: row[colIndex['resolution']] || row[colIndex['resoltion']] || '',
                            brightness: row[colIndex['brightness']] || '',
                            touch: (row[colIndex['touch']] === 'TRUE' || row[colIndex['touch']] === true),
                            sheetName: sheetName,
                            // LCD/STUDIA/OPS/player共通
                            os: row[colIndex['os']] || row[colIndex['OS']] || '',
                            cpu: row[colIndex['cpu']] || row[colIndex['CPU']] || '',
                            gpu: row[colIndex['gpu']] || row[colIndex['GPU']] || '',
                            ram: row[colIndex['ram']] || row[colIndex['RAM']] || '',
                            rom: row[colIndex['rom']] || row[colIndex['ROM']] || '',

        // 製品マスタから一意のPN一覧を取得（色違いを除く）
        function getUniquePNList() {
            const pnMap = new Map();
            productMaster.forEach(p => {
                if (!pnMap.has(p.pn)) {
                    pnMap.set(p.pn, p);
                }
            });
            return Array.from(pnMap.values());
        }

        // PNから製品情報を取得
        function getProductByPN(pn) {

            // 既存のNS-xxxの最大番号を取得
            const nsSerials = inventory

                .map(i => {
                    const match = i.serial.match(/^NS-(\d+)/);
                    return match ? parseInt(match[1]) : 0;
                });
            const maxNS = nsSerials.length > 0 ? Math.max(...nsSerials) : 0;
            const nextNum = String(maxNS + 1).padStart(3, '0');
            return `NS-${nextNum}`;
        }

        function showStatus(message) {

        function getFilteredInventory() {
            const today = new Date().toISOString().split('T')[0];
            
            let result = inventory.filter(item => {
                if (currentFilters.category && item.category !== currentFilters.category) return false;
                if (currentFilters.status && item.status !== currentFilters.status) return false;
                if (currentFilters.shelfNo && item.shelfNo !== currentFilters.shelfNo) return false;
                
                // 入庫日範囲フィルタ
                if (currentFilters.receiveDateFrom && item.receiveDate < currentFilters.receiveDateFrom) return false;
                if (currentFilters.receiveDateTo && item.receiveDate > currentFilters.receiveDateTo) return false;
                
                // 出庫先案件フィルタ
                const shipProjectFull = formatProjectNumber(item.shipPrefix, item.shipNumber);
                if (currentFilters.shipProject && !shipProjectFull.toLowerCase().includes(currentFilters.shipProject.toLowerCase())) return false;
                
                // 原価帯フィルタ
                if (currentFilters.costRange) {
                    const cost = Number(item.costJPY) || 0;
                    const [min, max] = currentFilters.costRange.split('-').map(v => v ? Number(v) : null);
                    if (min !== null && cost < min) return false;
                    if (max !== null && cost >= max) return false;
                }
                
                // クイックフィルタ: 棚未設定
                if (currentFilters.noShelf && item.shelfNo) return false;
                
                // 保管場所フィルタ
                if (currentFilters.location && item.location !== currentFilters.location) return false;
                
                if (currentFilters.search) {
                    const search = currentFilters.search.toLowerCase();
                    const matchSerial = item.serial.toLowerCase().includes(search);
                    const matchProduct = item.productName.toLowerCase().includes(search);
                    const orderProjectFull = formatProjectNumber(item.orderPrefix, item.orderNumber);
                    const matchProject = orderProjectFull.toLowerCase().includes(search) || shipProjectFull.toLowerCase().includes(search);
                    // 番号のみで検索もマッチ
                    const matchNumber = (item.orderNumber && item.orderNumber.toString().includes(search)) || 
                                       (item.shipNumber && item.shipNumber.toString().includes(search));
                    if (!matchSerial && !matchProduct && !matchProject && !matchNumber) return false;
                }
                return true;
            });

            // ソート
            const sortValue = currentFilters.sort || 'project-asc';
            const parts = sortValue.split('-');
            const sortKey = parts[0];
            const sortOrder = parts[1] || 'desc';
            
            result.sort((a, b) => {
                let valA, valB;
                switch(sortKey) {
                    case 'orderDate':
                        valA = a.orderDate || '9999';
                        valB = b.orderDate || '9999';
                        return sortOrder === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
                    case 'serial':
                        // Serial構造（例: YS0518, YS0518-1, YS0518-10）を「プレフィックス + 数字 + 枝番」に分解して比較
                        // 単純な文字列比較だと YS052 と YS0518 で桁数が違うため誤った順序になる
                        const parseSerial = (s) => {
                            const str = s || '';
                            // 例: "YS0518-10" → ["YS0518-10", "YS", "0518", "10"]
                            //     "YS0518"    → ["YS0518",    "YS", "0518", undefined]
                            const m = str.match(/^([A-Z]*)(\d+)(?:-(\d+))?/i);
                            if (!m) return { prefix: str, main: 0, sub: 0 };
                            return {
                                prefix: (m[1] || '').toUpperCase(),
                                main: parseInt(m[2], 10) || 0,
                                sub: m[3] ? parseInt(m[3], 10) : 0
                            };
                        };
                        const sA = parseSerial(a.serial);
                        const sB = parseSerial(b.serial);
                        let serialCompare = 0;
                        if (sA.prefix !== sB.prefix) {
                            serialCompare = sA.prefix.localeCompare(sB.prefix);
                        } else if (sA.main !== sB.main) {
                            serialCompare = sA.main - sB.main;
                        } else {
                            serialCompare = sA.sub - sB.sub;
                        }
                        return sortOrder === 'asc' ? serialCompare : -serialCompare;
                    case 'project':
                        // AD優先、次にSP、番号は数値順
                        const prefixA = (a.orderPrefix || 'AD').toUpperCase();
                        const prefixB = (b.orderPrefix || 'AD').toUpperCase();
                        const numA = parseInt(a.orderNumber) || 0;
                        const numB = parseInt(b.orderNumber) || 0;
                        
                        // まず接頭辞で比較（AD < SP）
                        if (prefixA !== prefixB) {
                            const prefixCompare = prefixA.localeCompare(prefixB);
                            return sortOrder === 'asc' ? prefixCompare : -prefixCompare;
                        }
                        // 同じ接頭辞なら番号で比較
                        const numCompare = numA - numB;
                        return sortOrder === 'asc' ? numCompare : -numCompare;
                    default:
                        valA = a.orderDate || '9999';
                        valB = b.orderDate || '9999';
                        return sortOrder === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
                }
            });

            return result;
        }

        function groupByProject(items) {
            const groups = {};
            items.forEach(item => {
                let project;
                if (groupMode === 'ship') {
                    // 出庫先でグループ化（出庫先が空なら「未出庫」）
                    project = formatProjectNumber(item.shipPrefix, item.shipNumber) || '未出庫';
                } else {
                    // 発注案件でグループ化
                    project = formatProjectNumber(item.orderPrefix, item.orderNumber) || '未設定';

                if (!groups[project]) {
                    groups[project] = [];
                }
                groups[project].push(item);
            });
            return groups;

        function getSummary() {
            const inStockItems = inventory.filter(i => i.status === '在庫中');
            const allocatedItems = inventory.filter(i => i.status === '引当済');
            const inStockValue = inStockItems.reduce((sum, i) => sum + (Number(i.costJPY) || 0), 0);
            const allocatedValue = allocatedItems.reduce((sum, i) => sum + (Number(i.costJPY) || 0), 0);
            // 棚卸資産は会計上「物理的に倉庫にある在庫」なので 在庫中+引当済 を合算
            const stocktakeCount = inStockItems.length + allocatedItems.length;
            const stocktakeValue = inStockValue + allocatedValue;
            const noShelfCount = inStockItems.filter(i => !i.shelfNo).length;
            const tokyoCount = inventory.filter(i => i.location === '東京' && (i.status === '在庫中' || i.status === '引当済')).length;
            const osakaCount = inventory.filter(i => i.location === '大阪' && (i.status === '在庫中' || i.status === '引当済')).length;
            return {
                total: inventory.length,
                waiting: inventory.filter(i => i.status === '入庫待ち').length,
                pendingInspection: inventory.filter(i => i.status === '検品待ち').length,
                inStock: inStockItems.length,
                inStockValue: inStockValue,
                allocated: allocatedItems.length,
                allocatedValue: allocatedValue,
                stocktakeCount: stocktakeCount,
                stocktakeValue: stocktakeValue,
                shipped: inventory.filter(i => i.status === '出庫済').length,
                defect: inventory.filter(i => i.status === '不良品').length,
                noShelf: noShelfCount,
                tokyo: tokyoCount,
                osaka: osakaCount
            };
        }

        // アイテム選択切替
        function toggleSelectItem(id) {
            if (selectedItems.has(id)) {
                selectedItems.delete(id);
            } else {
                selectedItems.add(id);
            }
            renderMain();
        }

        // 案件内全選択
        function toggleSelectAll(project) {
            const filtered = getFilteredInventory();
            const projectItems = filtered.filter(i => (formatProjectNumber(i.orderPrefix, i.orderNumber) || '未設定') === project);
            const allSelected = projectItems.every(i => selectedItems.has(i.id));
            
            if (allSelected) {
                projectItems.forEach(i => selectedItems.delete(i.id));
            } else {
                projectItems.forEach(i => selectedItems.add(i.id));
            }
            renderMain();
        }

            const filtered = getFilteredInventory();
            const allSelected = filtered.every(i => selectedItems.has(i.id));

            } else {
                filtered.forEach(i => selectedItems.add(i.id));

            renderMain();

        async function submitBulkShelf() {
            const shelfNo = document.getElementById('bulkShelfNo').value;
            // ロールバック用にバックアップ
            const backup = [];
            selectedItems.forEach(id => {
                // IDが重複してる可能性に備えて find ではなく filter で全件取得
                const items = inventory.filter(i => String(i.id) === String(id));
                items.forEach(item => {
                    backup.push({ ref: item, shelfNo: item.shelfNo });
                    item.shelfNo = shelfNo;
                });
            });
            try {
                await saveData();
                closeModal('bulkShelfModal');
                cancelBulkSelect();
                renderMain();
                showStatus(`✅ ${backup.length}件の棚番を更新しました`);
                setTimeout(() => showStatus(''), 2000);
            } catch (e) {
                console.error('棚番一括更新に失敗:', e);
                // ロールバック（オブジェクト参照で元に戻す）
                backup.forEach(b => {
                    b.ref.shelfNo = b.shelfNo;
                });
                alert('保存に失敗しました');
                renderMain();
            }
        }

            const noteApply = document.getElementById('bulkEditNoteApply').checked;

            const productNameApply = document.getElementById('bulkEditProductNameApply').checked;

            let updatedCount = 0;
            
            selectedItems.forEach(id => {

                if (item) {

                        item.note = note;

                    if (category) {
                        item.category = category;

                    if (productNameApply) {
                        item.productName = productName;

                    if (status) {

            closeModal('bulkEditModal');

                await saveData();
                showStatus(`✅ ${updatedCount}件を更新しました`);
                setTimeout(() => showStatus(''), 3000);
            })();
            
            cancelBulkSelect();
        }

        async function submitBulkReceive() {
            const receiveDate = document.getElementById('bulkReceiveDate').value;
            const newStatus = document.querySelector('input[name="bulkReceiveStatus"]:checked')?.value || '在庫中';
            
            const waitingItems = Array.from(selectedItems).filter(id => {
                const item = inventory.find(i => String(i.id) === String(id));
                return item && item.status === '入庫待ち';
            });
            
            // 影響を受ける案件を収集
            const affectedProjects = new Set();
            
            waitingItems.forEach(id => {
                const item = inventory.find(i => String(i.id) === String(id));
                if (item) {
                    item.status = newStatus;
                    item.receiveDate = receiveDate;
                    const projectNumber = formatProjectNumber(item.orderPrefix, item.orderNumber);
                    if (projectNumber) {
                        affectedProjects.add(projectNumber);
                    }
                }
            });
            
            saveData();
            closeModal('bulkReceiveModal');

        function submitBulkAllocate() {
            const projectInput = document.getElementById('bulkAllocateProject').value.trim();
            const note = document.getElementById('bulkAllocateNote').value.trim();
            
            if (!projectInput) {
                alert('出庫先案件番号を入力してください');
                return;
            }
            
            const parsed = parseProjectNumberString(projectInput);
            if (!parsed) {
                alert('案件番号の形式が正しくありません（例: AD-1700）');
                return;
            }
            
            const allocatableItems = Array.from(selectedItems).filter(id => {
                const item = inventory.find(i => String(i.id) === String(id));
                return item && (item.status === '在庫中' || item.status === '引当済');
            });
            
            allocatableItems.forEach(id => {
                const item = inventory.find(i => String(i.id) === String(id));
                if (!item) return;
                
                item.status = '引当済';
                item.shipPrefix = parsed.prefix;
                item.shipNumber = String(parsed.number);
                // 備考は入力時のみ上書き、空欄なら既存を維持
                if (note) {
                    item.note = note;
                }
            });
            
            saveData();
            closeModal('bulkAllocateModal');
            cancelBulkSelect();
            showStatus(`✅ ${allocatableItems.length}件を ${projectInput} に引当しました`);
            setTimeout(() => showStatus(''), 3000);
        }

        function toggleBulkShipMethod() {
            const method = document.querySelector('input[name="bulkShipMethod"]:checked').value;

            document.getElementById('bulkPickupFields').classList.toggle('hidden', method !== 'pickup');

        function submitBulkShip() {
            const shipProjectInput = document.getElementById('bulkShipProject').value.trim();
            const shipDate = document.getElementById('bulkShipDate').value;
            const method = document.querySelector('input[name="bulkShipMethod"]:checked').value;
            
            // 対象アイテムを取得（在庫中・引当済）
            const shippableItems = Array.from(selectedItems).filter(id => {
                const item = inventory.find(i => String(i.id) === String(id));
                return item && (item.status === '在庫中' || item.status === '引当済');
            });
            
            // 在庫中アイテムが含まれているなら出庫先案件番号は必須
            const hasInStock = shippableItems.some(id => {
                const item = inventory.find(i => String(i.id) === String(id));
                return item && item.status === '在庫中';
            });
            
            if (hasInStock && !shipProjectInput) {
                alert('在庫中のアイテムが含まれているため、出庫先案件番号を入力してください');
                return;
            }
            
            const parsedShip = shipProjectInput ? parseProjectNumberString(shipProjectInput) : null;
            
            // 配送・引渡し情報を一度だけ取得（全件共通）
            const shipCarrier = method === 'delivery' ? document.getElementById('bulkShipCarrier').value : '';
            const shipTrackingNo = method === 'delivery' ? document.getElementById('bulkShipTrackingNo').value.trim() : '';
            const shipDestination = method === 'delivery' ? document.getElementById('bulkShipDestination').value.trim() : '';
            const shipPickupTo = method === 'pickup' ? document.getElementById('bulkShipPickupTo').value.trim() : '';
            
            shippableItems.forEach(id => {
                const item = inventory.find(i => String(i.id) === String(id));
                if (!item) return;
                
                // 在庫中の場合のみ、出庫先案件番号をセット
                // 引当済の場合は既存の shipPrefix/shipNumber をそのまま使う
                if (item.status === '在庫中' && parsedShip) {
                    item.shipPrefix = parsedShip.prefix;
                    item.shipNumber = parsedShip.number;
                }
                
                item.shipDate = shipDate;
                item.shipMethod = method;
                
                if (method === 'delivery') {
                    item.shipCarrier = shipCarrier;
                    item.shipTrackingNo = shipTrackingNo;
                    item.shipDestination = shipDestination;
                } else {
                    item.shipPickupTo = shipPickupTo;
                }
                
                item.status = '出庫済';
            });
            
            saveData();
            closeModal('bulkShipModal');
            cancelBulkSelect();
            showStatus(`✅ ${shippableItems.length}件を出庫しました`);
            setTimeout(() => showStatus(''), 3000);
        }

        // 既存案件かどうかをチェック
        function findExistingProject(prefix, number, productName = null) {
            if (!number) return null;
            return projects.find(p => {
                const prefixMatch = p.prefix.toUpperCase() === prefix.toUpperCase();
                const numberMatch = String(p.number) === String(number);
                if (!prefixMatch || !numberMatch) return false;
                
                // 製品名が指定されていれば製品名も一致チェック
                if (productName) {
                    return p.productName === productName;
                }
                return true;
            });
        }
        
        // 案件番号 + 製品名で既存案件を検索（完全一致）
        function findExactProject(prefix, number, productName) {
            if (!number || !productName) return null;
            return projects.find(p => 
                p.prefix.toUpperCase() === prefix.toUpperCase() && 
                String(p.number) === String(number) &&
                p.productName === productName
            );
        }

        async function submitServiceTicket() {
            const projectNoRaw = document.getElementById('svcProjectNo').value.trim();
            const content = document.getElementById('svcContent').value.trim();
            const note = document.getElementById('svcNote').value.trim();

            if (!projectNoRaw) { alert('案件番号は必須です'); return; }
            if (!content) { alert('内容は必須です'); return; }

            const parsed = parseProjectNumberString(projectNoRaw);
            if (!parsed.prefix || !parsed.number) {
                alert('案件番号の形式が正しくありません（例: YS-0521）');
                return;
            }

            // 読み込み未完了なら作らない（保存ロックと整合）
            if (!dataLoaded) {
                alert('在庫データが読み込めていないため作成できません。更新してから再度お試しください。');
                return;
            }

            // Serialは表示用ラベル。同じ案件に複数チケットがあっても重複しないよう連番を付ける
            let serial = `SVC-${parsed.prefix}${parsed.number}`;
            if (inventory.some(i => i.serial === serial)) {
                let n = 2;
                while (inventory.some(i => i.serial === `${serial}-${n}`)) n++;
                serial = `${serial}-${n}`;
            }

            const today = new Date().toISOString().split('T')[0];
            inventory.push({
                id: Date.now().toString() + '-svc',
                serial: serial,
                category: 'サービス',
                productName: content,
                orderPrefix: parsed.prefix,   // 案件番号として付与（発注案件でのグループ表示用）
                orderNumber: parsed.number,

                receiveDate: '',

                shipPrefix: parsed.prefix,     // 出庫先＝引き当て（販売案件になる）
                shipNumber: parsed.number,
                costJPY: 0,
                note: note,
                shelfNo: '',
                location: '',

            });

            await saveData();
            closeModal('serviceTicketModal');
            renderMain();

        // 調達シートに案件を追加（未払い状態で登録）
        async function addToProcurement(parsedOrder, supplierId, productName, serial, quantity, orderDate, category) {
            try {
                const supplier = suppliers.find(s => s.id === parseInt(supplierId));
                const defaultPattern = supplier && supplier.paymentPatterns ? supplier.paymentPatterns[0] : { rates: [50, 50] };
                const depositSchedule = defaultPattern.rates.map((rate, idx) => ({
                    depositNumber: idx + 1,
                    percentage: rate,
                    amountUSD: 0, // 金額未定
                    paid: false,
                    paidDate: null,
                    exchangeRate: null,
                    amountJPY: null
                }));
                
                const serialDisplay = quantity > 1 ? `${serial}(1-${quantity})` : serial;
                
                // 案件シートに追加
                const newRow = [
                    Date.now().toString(),                    // ID
                    parsedOrder.prefix || 'AD',               // 接頭辞
                    parsedOrder.number,                       // 番号
                    supplierId,                               // サプライヤーID
                    productName,                              // 製品名
                    0,                                        // 総額USD（未定）
                    JSON.stringify(depositSchedule),          // デポジット予定
                    serialDisplay,                            // Serial
                    quantity,                                 // 数量
                    30,                                       // WorkingDays（デフォルト）
                    '',                                       // 集荷予定日（未定）
                    orderDate,                                // 発注日
                    '[]'                                      // 諸費用
                ];
                
                await gapi.client.sheets.spreadsheets.values.append({
                    spreadsheetId: SPREADSHEET_ID,
                    range: '案件!A:M',
                    valueInputOption: 'RAW',
                    insertDataOption: 'INSERT_ROWS',
                    resource: {
                        values: [newRow]
                    }
                });
                
                console.log('調達シートに案件を追加しました:', parsedOrder.prefix + '-' + parsedOrder.number);
            } catch (e) {
                console.error('調達シートへの追加に失敗しました:', e);
                // エラーでも在庫追加は成功しているので続行
            }
        }

        // 在庫にあって調達にない案件をリストアップ
        function getMissingProjects() {
            // 案件番号 × 製品名 でグループ化
            const inventoryProjects = {};

            // 在庫シート + アーカイブシートの両方を対象にする
            // （4台中3台が出荷済→アーカイブ済のようなケースで、台数・Serial・取得金を正しく合算するため）
            const allItems = [...inventory, ...archivedInventory];

            allItems.forEach(item => {
                if (!item.orderPrefix || !item.orderNumber) return;
                const key = `${item.orderPrefix}-${item.orderNumber}|${item.productName}`;
                if (!inventoryProjects[key]) {
                    inventoryProjects[key] = {
                        prefix: item.orderPrefix,
                        number: item.orderNumber,
                        productName: item.productName,
                        serials: [],
                        totalCost: 0,
                        orderDate: item.orderDate || ''
                    };
                }
                inventoryProjects[key].serials.push(item.serial);
                if (item.costJPY) {
                    inventoryProjects[key].totalCost += parseFloat(item.costJPY) || 0;
                }
                if (!inventoryProjects[key].orderDate && item.orderDate) {
                    inventoryProjects[key].orderDate = item.orderDate;
                }
            });
            
            // 調達にない案件だけ抽出（案件番号 + 製品名で判定）
            const missing = [];
            Object.keys(inventoryProjects).forEach(key => {
                const proj = inventoryProjects[key];
                const exists = findExactProject(proj.prefix, proj.number, proj.productName);
                if (!exists) {
                    // Serialをまとめる（例: YS0554-1, YS0554-2 → YS0554(1-2)）
                    const serialDisplay = formatSerialRange(proj.serials);
                    missing.push({
                        key,
                        prefix: proj.prefix,
                        number: proj.number,
                        productName: proj.productName,
                        serialDisplay,
                        quantity: proj.serials.length,
                        totalCost: proj.totalCost,
                        orderDate: proj.orderDate
                    });
                }
            });
            
            // 番号順 → 製品名順にソート
            missing.sort((a, b) => {
                if (a.prefix !== b.prefix) return a.prefix.localeCompare(b.prefix);
                if (a.number !== b.number) return parseInt(a.number) - parseInt(b.number);
                return a.productName.localeCompare(b.productName);
            });
            
            return missing;
        }
        
        // Serial配列をまとめて表示用にフォーマット
        function formatSerialRange(serials) {
            if (serials.length === 0) return '';
            if (serials.length === 1) return serials[0];
            
            // ベース部分と枝番を分離（例: YS0554-1 → base: YS0554, num: 1）
            const parsed = serials.map(s => {
                const match = s.match(/^(.+)-(\d+)$/);
                if (match) {
                    return { base: match[1], num: parseInt(match[2]), original: s };
                }
                return { base: s, num: null, original: s };
            });
            
            // ベースが全部同じかチェック
            const bases = [...new Set(parsed.map(p => p.base))];
            if (bases.length === 1 && parsed.every(p => p.num !== null)) {
                // 全部同じベースで枝番あり → まとめる
                const nums = parsed.map(p => p.num).sort((a, b) => a - b);
                const base = bases[0];
                
                // 連番かチェック
                const isConsecutive = nums.every((n, i) => i === 0 || n === nums[i-1] + 1);
                if (isConsecutive && nums.length > 1) {
                    return `${base}(${nums[0]}-${nums[nums.length-1]})`;
                } else {
                    return `${base}(${nums.join(',')})`;
                }
            }
            
            // バラバラなら最初のものだけ表示
            return serials.length > 2 ? `${serials[0]} 他${serials.length - 1}件` : serials.join(', ');
        }

        // インポート実行
        async function submitImportToProcurement() {
            const missing = getMissingProjects();
            const toImport = [];
            
            // チェックされた案件を収集
            missing.forEach((p, idx) => {
                const checkbox = document.getElementById(`importCheck_${idx}`);
                const supplierSelect = document.getElementById(`importSupplier_${idx}`);
                
                if (checkbox && checkbox.checked && supplierSelect && supplierSelect.value) {
                    toImport.push({
                        ...p,
                        supplierId: supplierSelect.value
                    });
                }
            });
            
            if (toImport.length === 0) {
                alert('インポートする案件を選択し、サプライヤーを設定してください');
                return;
            }
            
            if (!confirm(`${toImport.length}件の案件を調達に登録します。よろしいですか？`)) {
                return;
            }
            
            try {
                showStatus('インポート中...');
                
                const rows = toImport.map((p, idx) => {
                    const supplier = suppliers.find(s => s.id === parseInt(p.supplierId));
                    
                    // 取得金がある場合は支払済みとして登録
                    let depositSchedule;
                    if (p.totalCost > 0) {
                        depositSchedule = [{
                            depositNumber: 1,
                            percentage: 100,
                            amountUSD: 0,
                            paid: true,
                            paidDate: p.orderDate || null,
                            exchangeRate: null,
                            amountJPY: p.totalCost
                        }];
                    } else {
                        // 取得金がない場合はサプライヤーのデポジット設定を使用
                        const defaultPattern = supplier && supplier.paymentPatterns ? supplier.paymentPatterns[0] : { rates: [50, 50] };
                        depositSchedule = defaultPattern.rates.map((rate, idx) => ({
                            depositNumber: idx + 1,
                            percentage: rate,
                            amountUSD: 0,
                            paid: false,
                            paidDate: null,
                            exchangeRate: null,
                            amountJPY: null
                        }));
                    }
                    
                    return [
                        Date.now().toString() + '-' + p.number + '-' + idx,  // ID（ユニークにするためidxも付加）
                        p.prefix,                                  // 接頭辞
                        p.number,                                  // 番号
                        p.supplierId,                             // サプライヤーID
                        p.productName,                            // 製品名
                        0,                                        // 総額USD
                        JSON.stringify(depositSchedule),          // デポジット予定
                        p.serialDisplay,                          // Serial
                        p.quantity,                               // 数量
                        30,                                       // WorkingDays
                        '',                                       // 集荷予定日
                        p.orderDate || '',                        // 発注日
                        '[]'                                      // 諸費用
                    ];
                });
                
                await gapi.client.sheets.spreadsheets.values.append({
                    spreadsheetId: SPREADSHEET_ID,
                    range: '案件!A:M',
                    valueInputOption: 'RAW',
                    insertDataOption: 'INSERT_ROWS',
                    resource: {
                        values: rows
                    }
                });
                
                // projects配列を更新
                toImport.forEach(p => {
                    projects.push({
                        id: Date.now().toString() + '-' + p.number,
                        prefix: p.prefix,
                        number: p.number
                    });
                });
                
                closeModal('importModal');
                showStatus(`${toImport.length}件の案件を調達に登録しました`, 'success');
                
            } catch (e) {
                console.error('インポートに失敗しました:', e);
                alert('インポートに失敗しました: ' + e.message);
            }
        }

        // 全台入庫チェック → 調達シート更新
        async function checkAndUpdateProcurement(projectNumber) {
            try {
                // 同じ案件のアイテムを取得
                const projectItems = inventory.filter(i => 
                    formatProjectNumber(i.orderPrefix, i.orderNumber) === projectNumber
                );
                
                // 全て「在庫中」または「出庫済」か確認
                const allReceived = projectItems.every(i => 
                    i.status === '在庫中' || i.status === '出庫済'
                );
                
                if (!allReceived || projectItems.length === 0) return;
                
                // 調達シートを読み込み
                const response = await gapi.client.sheets.spreadsheets.values.get({
                    spreadsheetId: SPREADSHEET_ID,
                    range: '案件!A2:N',
                });
                const rows = response.result.values || [];
                
                // 該当案件を検索
                const parsed = parseProjectNumberString(projectNumber);
                let rowIndex = -1;
                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    if (row[1] === parsed.prefix && parseInt(row[2]) === parseInt(parsed.number)) {
                        rowIndex = i + 2; // 1-indexed + ヘッダー行
                        break;
                    }
                }
                
                if (rowIndex === -1) return;
                
                // N列（入庫完了）を更新
                await gapi.client.sheets.spreadsheets.values.update({
                    spreadsheetId: SPREADSHEET_ID,
                    range: `案件!N${rowIndex}`,
                    valueInputOption: 'RAW',
                    resource: { values: [['true']] }
                });
                
                showStatus(`✅ ${projectNumber} 全台入庫完了 → 調達に反映`);
                setTimeout(() => showStatus(''), 3000);
                
            } catch (err) {
                console.error('調達シート更新エラー:', err);
            }
        }

        // 引当済から出庫処理
        function submitShipFromAllocated(id) {
            const item = inventory.find(i => String(i.id) === String(id));
            if (!item) return;

            const method = document.querySelector('input[name="shipAllocatedMethod"]:checked').value;
            const shipDate = document.getElementById('shipAllocatedDate').value;

            // 備考に配送情報を追加
            let shipNote = item.note || '';
            if (method === 'delivery') {
                const carrier = document.getElementById('shipAllocatedCarrier').value;
                const trackingNo = document.getElementById('shipAllocatedTrackingNo').value.trim();
                const destination = document.getElementById('shipAllocatedDestination').value.trim();
                if (carrier || trackingNo || destination) {
                    shipNote = `[出庫] ${carrier}${trackingNo ? ' ' + trackingNo : ''}${destination ? ' → ' + destination : ''} ${shipNote}`.trim();
                }
            } else {
                const pickupTo = document.getElementById('shipAllocatedPickupTo').value.trim();
                if (pickupTo) {
                    shipNote = `[引渡] ${pickupTo} ${shipNote}`.trim();
                }
            }

            item.status = '出庫済';
            item.shipDate = shipDate;
            item.note = shipNote;
            // shipPrefix, shipNumber は引当時にすでに設定済み

            closeModal('shipFromAllocatedModal');
            saveData();
            renderMain();
            showStatus(`✅ ${item.serial || item.productName} を出庫しました`);
            setTimeout(() => showStatus(''), 3000);

            const shipProject = document.getElementById('shipProject').value.trim();
            const shipDate = document.getElementById('shipDate').value;

            item.shipPrefix = parsedShip.prefix;

            item.shipDate = shipDate;
            item.shipMethod = method;

                item.shipDestination = document.getElementById('shipDestination').value.trim();

        // 製品名からスペック情報を検索
        function findProductSpec(productName) {
            if (!productName) return null;
            // 製品名からPNを抽出（例: "YSD-ID3200Z black 32"" → "YSD-ID3200Z"）
            const pnMatch = productName.match(/^([A-Za-z0-9\-]+)/);
            if (!pnMatch) return null;
            const pn = pnMatch[1];
            return productMaster.find(p => p.pn === pn || productName.includes(p.pn));
        }

        // スペック情報のHTML生成
        function generateSpecHtml(spec) {
            const rows = [];
            
            // 共通項目
            if (spec.pn) rows.push(['型番', spec.pn]);
            if (spec.category) rows.push(['種別', spec.category]);
            if (spec.supplier) rows.push(['サプライヤー', spec.supplier]);
            if (spec.inch) rows.push(['インチ', spec.inch + '"']);
            if (spec.resolution) rows.push(['解像度', spec.resolution]);
            if (spec.brightness) rows.push(['輝度', spec.brightness + 'cd/m²']);
            if (spec.touch !== undefined) rows.push(['タッチ', spec.touch ? 'あり' : 'なし']);
            
            // LCD/OPS/player固有
            if (spec.os) rows.push(['OS', spec.os]);
            if (spec.cpu) rows.push(['CPU', spec.cpu]);
            if (spec.gpu) rows.push(['GPU', spec.gpu]);
            if (spec.ram) rows.push(['RAM', spec.ram]);
            if (spec.rom) rows.push(['ROM', spec.rom]);
            if (spec.soc) rows.push(['SoC', spec.soc]);
            if (spec.graphics_card) rows.push(['グラフィック', spec.graphics_card]);
            
            // STUDIA固有
            if (spec.edla_certified) rows.push(['EDLA認証', spec.edla_certified === 'TRUE' ? 'あり' : 'なし']);
            if (spec.touch_type) rows.push(['タッチ方式', spec.touch_type]);
            if (spec.weight_net) rows.push(['重量（本体）', spec.weight_net]);
            if (spec.weight_gross) rows.push(['重量（梱包）', spec.weight_gross]);
            
            // LED固有
            if (spec.pixel_pitch) rows.push(['ピクセルピッチ', 'P' + spec.pixel_pitch]);
            if (spec.smd_type) rows.push(['SMD', spec.smd_type]);
            if (spec.ip_rating) rows.push(['IP等級', spec.ip_rating]);
            
            // マトリクス固有
            if (spec.input_count) rows.push(['入力数', spec.input_count]);
            if (spec.output_count) rows.push(['出力数', spec.output_count]);
            
            // TVwall固有
            if (spec.hdmi_out) rows.push(['HDMI出力', spec.hdmi_out]);
            if (spec.hdmi_in) rows.push(['HDMI入力', spec.hdmi_in]);
            
            // LED_others固有
            if (spec.product_type) rows.push(['製品タイプ', spec.product_type]);
            if (spec.detail) rows.push(['詳細', spec.detail]);
            
            // OPS固有
            if (spec.usb3_amount) rows.push(['USB3.0', spec.usb3_amount + '個']);
            if (spec.usb_typec_amount) rows.push(['USB Type-C', spec.usb_typec_amount + '個']);
            if (spec.dp_out) rows.push(['DP出力', spec.dp_out]);
            
            // player固有
            if (spec.wifi) rows.push(['Wi-Fi', spec.wifi]);
            if (spec.bluetooth_version) rows.push(['Bluetooth', spec.bluetooth_version]);
            if (spec.usb2_amount) rows.push(['USB2.0', spec.usb2_amount + '個']);
            
            // dongle固有
            if (spec.connector_type) rows.push(['接続タイプ', spec.connector_type]);
            if (spec.resolution_max) rows.push(['最大解像度', spec.resolution_max]);
            if (spec.distance_max) rows.push(['最大距離', spec.distance_max]);
            if (spec.touchback) rows.push(['タッチバック', spec.touchback === 'TRUE' ? '対応' : '非対応']);
            
            // スタンド固有
            if (spec.inch_65 || spec.inch_75 || spec.inch_86 || spec.inch_98 || spec.inch_110) {
                const sizes = [];
                if (spec.inch_65 === 'TRUE') sizes.push('65"');
                if (spec.inch_75 === 'TRUE') sizes.push('75"');
                if (spec.inch_86 === 'TRUE') sizes.push('86"');
                if (spec.inch_98 === 'TRUE') sizes.push('98"');
                if (spec.inch_110 === 'TRUE') sizes.push('110"');
                if (sizes.length > 0) rows.push(['対応サイズ', sizes.join(', ')]);
            }
            if (spec.tilt_angle) rows.push(['チルト角度', spec.tilt_angle]);
            if (spec.height) rows.push(['高さ調整', spec.height]);
            if (spec.electric) rows.push(['電動', spec.electric === 'TRUE' ? 'あり' : 'なし']);
            
            // 電源関連
            if (spec.power_max_w) rows.push(['最大消費電力', spec.power_max_w + 'W']);
            if (spec.power_consumption) rows.push(['消費電力', spec.power_consumption]);
            if (spec.warranty_term) rows.push(['保証期間', spec.warranty_term]);
            
            // ドキュメントリンク生成
            let docLinks = '';
            if (spec.doc_path) {
                const baseUrl = 'https://yamato-signage.com/wp-content/uploads/';
                const datasheetUrl = `${baseUrl}${spec.doc_path}_datasheet.pdf`;
                const drawingUrl = `${baseUrl}${spec.doc_path}_drawing.pdf`;
                docLinks = `
                    <div class="flex gap-2 mt-4">
                        <a href="${datasheetUrl}" target="_blank" class="flex-1 px-3 py-2 bg-blue-600 text-white text-sm text-center rounded-lg hover:bg-blue-700">
                            📄 カタログ
                        </a>
                        <a href="${drawingUrl}" target="_blank" class="flex-1 px-3 py-2 bg-blue-600 text-white text-sm text-center rounded-lg hover:bg-blue-700">
                            📐 図面
                        </a>
                    </div>
                `;
            }
            
            if (rows.length === 0 && !spec.doc_path) {
                return '<p class="text-slate-500 text-sm">スペック情報がありません</p>';
            }
            
            return `
                <div class="bg-slate-50 dark:bg-slate-700 rounded-lg p-4">
                    ${rows.length > 0 ? `
                    <table class="w-full text-sm">
                        ${rows.map(([label, value]) => `
                            <tr class="border-b border-slate-200 dark:border-slate-600 last:border-0">
                                <td class="py-2 text-slate-500 dark:text-slate-400 w-1/3">${label}</td>
                                <td class="py-2 dark:text-white font-medium">${value}</td>
                            </tr>
                        `).join('')}
                    </table>
                    ` : ''}
                    ${docLinks}
                </div>
            `;
        }

        async function submitEdit(id) {

            item.serial = document.getElementById('editSerial').value.trim();
            item.category = document.getElementById('editCategory').value;

            if (parsedOrder.prefix || parsedOrder.number) {

                item.orderNumber = parsedOrder.number;
            } else if (orderProjectInput === '') {
                // 明示的に空欄にした場合のみクリア
                item.orderPrefix = '';
                item.orderNumber = '';
            }
            // それ以外（パース失敗）は何もしない＝元の値を維持
            
            item.orderDate = document.getElementById('editOrderDate').value;
            item.supplierId = document.getElementById('editSupplierId').value;
            item.receiveDate = document.getElementById('editReceiveDate').value;
            item.costJPY = document.getElementById('editCostJPY').value;
            item.status = document.getElementById('editStatus').value;
            item.shipDate = document.getElementById('editShipDate').value;
            
            const shipProjectInput = document.getElementById('editShipProject').value.trim();
            const parsedShip = parseProjectNumberString(shipProjectInput);
            // 出庫先も同じガード
            if (parsedShip.prefix || parsedShip.number) {
                item.shipPrefix = parsedShip.prefix;
                item.shipNumber = parsedShip.number;
            } else if (shipProjectInput === '') {
                item.shipPrefix = '';
                item.shipNumber = '';
            }
            
            item.note = document.getElementById('editNote').value.trim();

            await saveData();
            closeModal('editModal');
            renderMain();
        }
