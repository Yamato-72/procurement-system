            await saveData();
            closeModal('editModal');
            renderMain();
        }

        // 一括削除
        async function bulkDelete() {
            const count = selectedItems.size;
            if (count === 0) return;
            
            // 選択されたアイテムの情報を表示
            const selectedList = Array.from(selectedItems).map(id => {
                const item = inventory.find(i => String(i.id) === String(id));
                return item ? `${item.serial || '(シリアルなし)'} - ${item.productName || '(製品名なし)'}` : id;
            });
            
            const confirmMsg = `以下の${count}件を削除しますか？\n\n${selectedList.slice(0, 10).join('\n')}${count > 10 ? `\n... 他${count - 10}件` : ''}\n\n※この操作は取り消せません`;
            
            if (!confirm(confirmMsg)) return;
            
            showStatus(`削除中... (${count}件)`);
            
            // 選択されたアイテムを削除
            const idsToDelete = new Set(selectedItems);
            inventory = inventory.filter(i => !idsToDelete.has(String(i.id)));
            
            // 選択をクリア
            selectedItems.clear();
            bulkSelectMode = false;
            
            await saveData();
            renderMain();
            
            showStatus(`✅ ${count}件を削除しました`);
            setTimeout(() => showStatus(''), 3000);
        }

        // アーカイブ処理
        async function archiveItem(id) {
            if (!confirm('この在庫をアーカイブしますか？')) return;
            
            const item = inventory.find(i => String(i.id) === String(id));
            if (!item) {
                alert('対象アイテムが見つかりません');
                return;
            }

            // archiveLoadedが false だとsaveDataでアーカイブ書き出しがスキップされてデータが消える
            if (!archiveLoaded) {
                alert('アーカイブシートの読み込みが完了していません。ページを再読み込みしてからもう一度お試しください。');
                return;
            }

            archivedInventory.push(item);
            // 削除時もidを文字列比較に統一（型不一致で削除漏れを防ぐ）
            inventory = inventory.filter(i => String(i.id) !== String(id));
            
            try {
                await saveData();
                renderMain();
                showStatus('✅ アーカイブしました');
                setTimeout(() => showStatus(''), 2000);
            } catch (e) {
                console.error('アーカイブ保存に失敗:', e);
                alert('保存に失敗しました。もう一度お試しください。');
                // 失敗したらメモリ上の変更を戻す
                inventory.push(item);
                archivedInventory = archivedInventory.filter(i => String(i.id) !== String(id));
                renderMain();
            }
        }

        // 一括保管（アーカイブ）
        async function bulkArchive() {
            const count = selectedItems.size;
            if (count === 0) return;

            // archiveLoadedが false だとsaveDataでアーカイブ書き出しがスキップされてデータが消える
            if (!archiveLoaded) {
                alert('アーカイブシートの読み込みが完了していません。ページを再読み込みしてからもう一度お試しください。');
                return;
            }
            
            // 選択されたアイテムの情報を取得
            const selectedList = Array.from(selectedItems).map(id => {
                const item = inventory.find(i => String(i.id) === String(id));
                return item;
            }).filter(item => item);
            
            // 出庫済以外のアイテムがあるか確認
            const nonShippedItems = selectedList.filter(item => item.status !== '出庫済');
            
            let confirmMsg = `${count}件をアーカイブしますか？\n\n`;
            
            if (nonShippedItems.length > 0) {
                confirmMsg += `⚠️ 出庫済以外のアイテムが${nonShippedItems.length}件含まれています：\n`;
                confirmMsg += nonShippedItems.slice(0, 5).map(i => `  - ${i.serial || '(シリアルなし)'}: ${i.status}`).join('\n');
                if (nonShippedItems.length > 5) {
                    confirmMsg += `\n  ... 他${nonShippedItems.length - 5}件`;
                }
                confirmMsg += '\n\n続行しますか？';
            }
            
            if (!confirm(confirmMsg)) return;
            
            showStatus(`アーカイブ中... (${count}件)`);
            
            // 選択されたアイテムをアーカイブに移動
            const idsToArchive = new Set(selectedItems);
            
            selectedList.forEach(item => {
                archivedInventory.push(item);
            });
            
            inventory = inventory.filter(i => !idsToArchive.has(String(i.id)));
            
            // 選択をクリア
            selectedItems.clear();
            bulkSelectMode = false;
            
            await saveData();
            renderMain();
            
            showStatus(`✅ ${count}件をアーカイブしました`);
            setTimeout(() => showStatus(''), 3000);
        }

        // アーカイブ検索用の状態
        let archiveSearchQuery = '';
        let archiveFilterStatus = '';
        let archiveCurrentPage = 1;          // 現在のページ番号（1始まり）
        const ARCHIVE_PAGE_SIZE = 100;       // 1ページあたりの件数

        function showArchiveModal() {

                        <!-- 検索・フィルタ -->
                        <div class="flex flex-col sm:flex-row gap-2 mb-4">

                                チェックを入れて「選択を在庫に戻す」を押すと、<strong>元のステータスを保持したまま</strong>一括で戻せます（過去分の原価入力用）。

        // テーブル・タイトル・ページ送りだけを更新（検索ボックスは触らない＝フォーカス維持）
        function updateArchiveTable() {
            // フィルタ適用
            let filtered = archivedInventory;
            if (archiveSearchQuery) {
                const q = archiveSearchQuery.toLowerCase();
                filtered = filtered.filter(item => 
                    (item.serial || '').toLowerCase().includes(q) ||
                    (item.productName || '').toLowerCase().includes(q) ||
                    (item.category || '').toLowerCase().includes(q) ||
                    formatProjectNumber(item.orderPrefix, item.orderNumber).toLowerCase().includes(q) ||
                    formatProjectNumber(item.shipPrefix, item.shipNumber).toLowerCase().includes(q) ||
                    (item.note || '').toLowerCase().includes(q)
                );
            }
            if (archiveFilterStatus) {
                filtered = filtered.filter(item => item.status === archiveFilterStatus);
            }

            // ページネーション計算
            const totalPages = Math.max(1, Math.ceil(filtered.length / ARCHIVE_PAGE_SIZE));
            if (archiveCurrentPage > totalPages) archiveCurrentPage = totalPages;
            if (archiveCurrentPage < 1) archiveCurrentPage = 1;
            const startIdx = (archiveCurrentPage - 1) * ARCHIVE_PAGE_SIZE;
            const endIdx = Math.min(startIdx + ARCHIVE_PAGE_SIZE, filtered.length);
            const pageItems = filtered.slice(startIdx, endIdx);
            const rangeLabel = filtered.length === 0 ? '0件' : `${startIdx + 1}-${endIdx} / 全${filtered.length}件`;

            // タイトル更新
            const titleEl = document.getElementById('archiveTitle');
            if (titleEl) titleEl.textContent = `📦 アーカイブ一覧（${rangeLabel}）`;

            // テーブル本体更新
            const tbodyEl = document.getElementById('archiveTableBody');
            if (tbodyEl) {
                tbodyEl.innerHTML = filtered.length === 0 ? `
                    <tr><td colspan="8" class="px-3 py-8 text-center text-slate-500">
                        ${archivedInventory.length === 0 ? 'アーカイブはありません' : '検索条件に一致するアイテムがありません'}
                    </td></tr>
                ` : pageItems.map(item => `
                    <tr class="hover:bg-slate-50 dark:hover:bg-slate-700">
                        <td class="px-2 py-2 text-center"><input type="checkbox" class="archive-checkbox rounded" data-id="${item.id}"></td>
                        <td class="px-2 sm:px-3 py-2 font-mono text-xs sm:text-sm">${escapeHtml(item.serial || '-')}</td>
                        <td class="px-2 sm:px-3 py-2 text-xs sm:text-sm hidden sm:table-cell">${escapeHtml(item.category || '')}</td>
                        <td class="px-2 sm:px-3 py-2 text-xs sm:text-sm">${escapeHtml(item.productName || '')}</td>
                        <td class="px-2 sm:px-3 py-2 text-xs sm:text-sm hidden md:table-cell">${formatProjectNumber(item.orderPrefix, item.orderNumber)}</td>
                        <td class="px-2 sm:px-3 py-2 text-xs sm:text-sm">${formatProjectNumber(item.shipPrefix, item.shipNumber) || '-'}</td>
                        <td class="px-2 sm:px-3 py-2 text-xs sm:text-sm hidden sm:table-cell">
                            <span class="px-2 py-0.5 rounded text-xs ${getStatusColor(item.status)}">${item.status || '-'}</span>
                        </td>
                        <td class="px-2 sm:px-3 py-2 text-center">
                            <button onclick="showRestoreModal('${item.id}')" 
                                class="px-2 sm:px-3 py-1 bg-blue-500 text-white text-xs rounded hover:bg-blue-600">
                                復帰
                            </button>
                        </td>
                    </tr>
                `).join('');
            }

            // ページ送り更新
            const pagEl = document.getElementById('archivePagination');
            if (pagEl) {
                pagEl.innerHTML = totalPages > 1 ? `
                    <div class="mt-3 flex items-center justify-center gap-2 text-sm">
                        <button onclick="changeArchivePage(-1)" ${archiveCurrentPage <= 1 ? 'disabled' : ''}
                            class="px-3 py-1.5 border rounded ${archiveCurrentPage <= 1 ? 'text-slate-300 dark:text-slate-600 cursor-not-allowed' : 'hover:bg-slate-100 dark:hover:bg-slate-700 dark:border-slate-600 dark:text-white'}">
                            ← 前の100件
                        </button>
                        <span class="px-3 text-slate-600 dark:text-slate-300">${archiveCurrentPage} / ${totalPages} ページ</span>
                        <button onclick="changeArchivePage(1)" ${archiveCurrentPage >= totalPages ? 'disabled' : ''}
                            class="px-3 py-1.5 border rounded ${archiveCurrentPage >= totalPages ? 'text-slate-300 dark:text-slate-600 cursor-not-allowed' : 'hover:bg-slate-100 dark:hover:bg-slate-700 dark:border-slate-600 dark:text-white'}">
                            次の100件 →
                        </button>
                    </div>
                ` : '';
            }
        }

        // アーカイブ検索更新
        function updateArchiveSearch(query) {
            archiveSearchQuery = query;
            archiveCurrentPage = 1;  // 検索すると1ページ目に戻る
            // デバウンス処理（テーブルだけ差し替え、検索ボックスのフォーカスは維持される）
            clearTimeout(window.archiveSearchTimeout);
            window.archiveSearchTimeout = setTimeout(() => {
                updateArchiveTable();
            }, 300);
        }

        function updateArchiveStatusFilter(status) {
            archiveFilterStatus = status;
            archiveCurrentPage = 1;  // フィルタ変更で1ページ目に戻る
            updateArchiveTable();
        }

            if (archiveCurrentPage < 1) archiveCurrentPage = 1;
            updateArchiveTable();

            const modalBox = document.querySelector('#archiveModal > div > div');
            if (modalBox) modalBox.scrollTop = 0;
        }

                        <div class="flex gap-3 mt-6">

                                キャンセル
                            </button>
                            <button onclick="executeRestore('${item.id}')" 
                                class="flex-1 px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                                復帰する
                            </button>

                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        // 復帰実行
        async function executeRestore(id) {
            const item = archivedInventory.find(i => String(i.id) === String(id));
            if (!item) {
                alert('アイテムが見つかりません');
                return;
            }

            const newStatus = document.getElementById('restoreStatus').value;
            const reason = document.getElementById('restoreReason').value.trim();
            const clearShipInfo = document.getElementById('clearShipInfo').checked;

            // 復帰処理
            const restoredItem = { ...item };
            restoredItem.status = newStatus;

            // 備考に復帰理由を追記
            const today = new Date().toLocaleDateString('ja-JP');
            const restoreNote = `[${today} 復帰: ${reason || newStatus + 'として復帰'}]`;
            restoredItem.note = restoredItem.note 
                ? restoredItem.note + ' ' + restoreNote 
                : restoreNote;

            // 出庫情報クリア
            if (clearShipInfo) {
                restoredItem.shipDate = '';
                restoredItem.shipPrefix = '';
                restoredItem.shipNumber = '';
            }

            // アーカイブから削除、在庫に追加
            archivedInventory = archivedInventory.filter(i => String(i.id) !== String(id));
            inventory.push(restoredItem);

            // 保存
            showStatus('復帰中...');
            await saveData();
            
            // モーダルを閉じて再描画
            closeModal('restoreModal');
            renderArchiveModal();
            renderMain();
            
            showStatus(`✅ ${restoredItem.serial || restoredItem.productName} を復帰しました`);
            setTimeout(() => showStatus(''), 3000);
        }

        // アーカイブ一覧の全選択トグル
        function toggleArchiveSelectAll() {
            const selectAll = document.getElementById('archiveSelectAll');
            if (!selectAll) return;
            document.querySelectorAll('.archive-checkbox').forEach(cb => {
                cb.checked = selectAll.checked;
            });
        }

        // 一括復帰（元のステータスを保持したまま在庫に戻す）
        async function executeBulkRestore() {
            const checked = Array.from(document.querySelectorAll('.archive-checkbox:checked'));
            if (checked.length === 0) {
                alert('在庫に戻すアイテムを選択してください');
                return;
            }

            const ids = checked.map(cb => cb.getAttribute('data-id'));

            if (!confirm(`${ids.length}件を在庫に戻します。\n\nステータス（出庫済など）はそのまま保持されます。\nよろしいですか？`)) {
                return;
            }

            // 対象アイテムをアーカイブから在庫へ移動（ステータスはそのまま）
            const restored = [];
            ids.forEach(id => {
                const item = archivedInventory.find(i => String(i.id) === String(id));
                if (item) {
                    inventory.push({ ...item });
                    restored.push(id);
                }
            });

            // アーカイブから取り除く
            archivedInventory = archivedInventory.filter(i => !restored.includes(String(i.id)) && !restored.includes(i.id));

            showStatus('在庫に戻しています...');
            await saveData();

            renderArchiveModal();
            renderMain();

            showStatus(`✅ ${restored.length}件を在庫に戻しました（ステータス保持）`);
            setTimeout(() => showStatus(''), 3000);
        }

            const modal = document.getElementById(id);
            if (modal) modal.remove();

        // ==================== レポート機能 ====================

        // レポートメニュー開閉
        function toggleReportMenu() {
            const menu = document.getElementById('reportMenu');
            menu.classList.toggle('hidden');
            // 外側クリックで閉じる
            if (!menu.classList.contains('hidden')) {
                setTimeout(() => {
                    document.addEventListener('click', closeReportMenuOnClickOutside);
                }, 0);
            }
        }

        function closeReportMenuOnClickOutside(e) {
            const menu = document.getElementById('reportMenu');
            if (menu && !menu.contains(e.target) && !e.target.closest('button[onclick="toggleReportMenu()"]')) {
                menu.classList.add('hidden');
                document.removeEventListener('click', closeReportMenuOnClickOutside);
            }
        }

        // CSV出力
        function exportCSV() {
            const filtered = getFilteredInventory();
            if (filtered.length === 0) {
                alert('出力するデータがありません');
                return;
            }

            const headers = ['Serial', '種別', '製品名', '棚番', '保管場所', '発注案件', '発注日', '入庫日', '取得金（税別）', 'ステータス', '出庫日', '出庫先案件', '備考'];
            const rows = filtered.map(item => [
                item.serial,
                item.category,
                item.productName,
                item.shelfNo || '',
                item.location || '蓮田',
                formatProjectNumber(item.orderPrefix, item.orderNumber) || '',
                item.orderDate || '',
                item.receiveDate || '',
                item.costJPY || '',
                item.status,
                item.shipDate || '',
                formatProjectNumber(item.shipPrefix, item.shipNumber) || '',
                item.note || ''
            ]);

            const csvContent = [headers, ...rows]
                .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
                .join('\n');

            const bom = '\uFEFF';
            const blob = new Blob([bom + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;

        // ==================== QRスキャン機能 ====================
        let html5QrCode = null;
        let scannerModal = null;
        
        function openQRScanner() {
            // スキャナーモーダルを作成
            scannerModal = document.createElement('div');
            scannerModal.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4';
            scannerModal.innerHTML = `
                <div class="bg-white dark:bg-slate-800 rounded-xl w-full max-w-md shadow-2xl">
                    <div class="flex justify-between items-center p-4 border-b dark:border-slate-700">
                        <h3 class="text-lg font-bold dark:text-white">📷 QRスキャン</h3>
                        <button onclick="closeQRScanner()" class="text-2xl text-slate-400 hover:text-slate-600">&times;</button>
                    </div>
                    <div class="p-4">
                        <div id="qr-reader" class="w-full rounded-lg overflow-hidden"></div>
                        <p id="scan-status" class="text-center text-sm text-slate-500 dark:text-slate-400 mt-3">カメラを起動中...</p>
                    </div>
                    <div class="p-4 border-t dark:border-slate-700">
                        <p class="text-xs text-slate-500 dark:text-slate-400 text-center">QRコードまたはバーコードをカメラに向けてください</p>
                    </div>
                </div>
            `;
            document.body.appendChild(scannerModal);
            
            // スキャナーを初期化
            setTimeout(() => {
                html5QrCode = new Html5Qrcode("qr-reader");
                html5QrCode.start(
                    { facingMode: "environment" },
                    {
                        fps: 10,
                        qrbox: { width: 250, height: 250 }
                    },
                    onScanSuccess,
                    onScanFailure
                ).catch(err => {
                    document.getElementById('scan-status').textContent = 'カメラの起動に失敗: ' + err;
                });
            }, 100);
        }
        
        function onScanSuccess(decodedText, decodedResult) {
            // スキャン成功時の処理
            console.log('Scanned:', decodedText);
            
            // スキャナーを停止
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    // モーダルを閉じる
                    if (scannerModal) {
                        scannerModal.remove();
                        scannerModal = null;
                    }
                    
                    // スキャン結果を処理
                    processScannedCode(decodedText);
                });
            }
        }
        
        function onScanFailure(error) {
            // スキャン失敗（通常は無視）
        }
        
        function closeQRScanner() {
            if (html5QrCode) {
                html5QrCode.stop().catch(err => console.log(err));
                html5QrCode = null;
            }
            if (scannerModal) {
                scannerModal.remove();
                scannerModal = null;
            }
        }
        
        function processScannedCode(code) {
            // コードを正規化（トリム、大文字）
            const normalizedCode = code.trim().toUpperCase();
            console.log('検索中:', normalizedCode, '在庫数:', inventory.length);
            
            // まずIDで完全一致検索（QRにIDが入っている場合）
            const itemById = inventory.find(i => String(i.id) === code.trim());
            if (itemById) {
                showScanActionModal(itemById);
                return;
            }
            
            // シリアルで完全一致検索
            const itemBySerial = inventory.find(i => {
                const serial = (i.serial || '').trim().toUpperCase();
                return serial && serial === normalizedCode;
            });
            if (itemBySerial) {
                showScanActionModal(itemBySerial);
                return;
            }
            
            // 案件番号で検索（複数マッチの可能性あり）
            const itemsByProject = inventory.filter(i => {
                const projectNum = formatProjectNumber(i.orderPrefix, i.orderNumber).toUpperCase();
                return projectNum === normalizedCode;
            });
            
            if (itemsByProject.length === 1) {
                showScanActionModal(itemsByProject[0]);
                return;
            } else if (itemsByProject.length > 1) {
                // 複数マッチ → 選択モーダルを表示
                showMultiMatchModal(itemsByProject, normalizedCode);
                return;
            }
            
            // 部分一致検索（シリアル）
            const itemByPartial = inventory.find(i => {
                const serial = (i.serial || '').trim().toUpperCase();
                if (serial && serial.includes(normalizedCode)) return true;
                if (serial && normalizedCode.includes(serial)) return true;
                return false;
            });
            
            if (itemByPartial) {
                showScanActionModal(itemByPartial);
                return;
            }
            
            // 見つからない場合
            console.log('検索失敗。在庫内シリアル一覧:', inventory.map(i => i.serial).filter(s => s).slice(0, 20));
            alert(`「${code}」に該当するアイテムが見つかりません。\n\n新規登録しますか？`);
            // TODO: 新規登録フローへ
        }

                        </button>
                        <button onclick="closeScanActionModal();openQRScanner()" class="flex flex-col items-center justify-center p-4 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600">
                            <span class="text-2xl mb-1">📷</span>
                            <span class="text-sm font-semibold text-gray-700 dark:text-gray-300">続けて</span>
                        </button>
                    </div>
                    <div class="p-4 border-t dark:border-slate-700">
                        <button onclick="closeScanActionModal()" class="w-full py-2 text-slate-600 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200">閉じる</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        function closeScanActionModal() {
            const modal = document.getElementById('scanActionModal');
            if (modal) modal.remove();
        }
        
        // クイック入庫
        function quickReceive(itemId) {
            const item = inventory.find(i => String(i.id) === String(itemId));
            if (!item) return;
            
            // 入庫先選択モーダル
            const modal = document.createElement('div');
            modal.id = 'receiveModal';
            modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4';
            modal.innerHTML = `
                <div class="bg-white dark:bg-slate-800 rounded-xl w-full max-w-sm shadow-2xl">
                    <div class="p-4 border-b dark:border-slate-700">
                        <h3 class="font-bold text-lg text-slate-900 dark:text-white">入庫処理</h3>
                        <p class="text-sm text-slate-500 dark:text-slate-400">${item.productName}</p>
                    </div>
                    <div class="p-4">
                        <p class="text-sm text-slate-700 dark:text-slate-300 mb-4">入庫後のステータスを選択：</p>
                        <div class="space-y-3">
                            <button onclick="executeReceive('${item.id}', '検品待ち')" class="w-full p-4 bg-orange-100 dark:bg-orange-900/30 border-2 border-orange-300 dark:border-orange-700 rounded-xl hover:bg-orange-200 dark:hover:bg-orange-900/50 text-left">
                                <div class="flex items-center gap-3">
                                    <span class="text-2xl">🔍</span>
                                    <div>
                                        <p class="font-bold text-orange-700 dark:text-orange-400">検品待ち</p>
                                        <p class="text-xs text-orange-600 dark:text-orange-500">検品ナビで検品後に在庫へ</p>
                                    </div>
                                </div>
                            </button>
                            <button onclick="executeReceive('${item.id}', '在庫中')" class="w-full p-4 bg-emerald-100 dark:bg-emerald-900/30 border-2 border-emerald-300 dark:border-emerald-700 rounded-xl hover:bg-emerald-200 dark:hover:bg-emerald-900/50 text-left">
                                <div class="flex items-center gap-3">
                                    <span class="text-2xl">✅</span>
                                    <div>
                                        <p class="font-bold text-emerald-700 dark:text-emerald-400">在庫中（検品スキップ）</p>
                                        <p class="text-xs text-emerald-600 dark:text-emerald-500">検品不要、すぐに在庫へ</p>
                                    </div>
                                </div>
                            </button>
                        </div>
                    </div>
                    <div class="p-4 border-t dark:border-slate-700">
                        <button onclick="document.getElementById('receiveModal').remove()" class="w-full py-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg">
                            キャンセル
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        function executeReceive(itemId, newStatus) {
            const item = inventory.find(i => String(i.id) === String(itemId));
            if (!item) return;
            
            const today = new Date().toISOString().split('T')[0];
            item.status = newStatus;
            item.receiveDate = today;
            
            document.getElementById('receiveModal')?.remove();
            
            saveInventory();
            renderMain();
            
            const statusText = newStatus === '検品待ち' ? '🔍 検品待ちに設定' : '✅ 在庫に追加';
            showStatus(`${statusText}: ${item.serial || item.productName}`, 'success');
        }
        
        // クイック出庫（出庫先入力）
        function quickShip(itemId) {
            const item = inventory.find(i => String(i.id) === String(itemId));
            if (!item) return;
            
            const shipTo = prompt('出庫先案件番号を入力（例: SP-0001）:', '');
            if (shipTo === null) return;
            
            const today = new Date().toISOString().split('T')[0];
            item.status = '出庫済';
            item.shipDate = today;
            
            // 出庫先の解析
            const match = shipTo.match(/^([A-Z]+)-?(\d+)$/i);
            if (match) {
                item.shipPrefix = match[1].toUpperCase();
                item.shipNumber = parseInt(match[2]);
            }
            
            saveInventory();
            renderMain();
            showStatus(`📤 ${item.serial || item.productName} を出庫しました`, 'success');
        }
        
        // 棚卸しチェック
        function markAsChecked(itemId) {
            showStatus(`✅ 棚卸しチェック完了`, 'success');
            // TODO: 棚卸し記録を保存する場合はここに実装
        }
        
        // ==================== QRラベル印刷機能 ====================
        function showLabelPrintModal() {
            toggleReportMenu(); // メニューを閉じる
            
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4';
            modal.id = 'labelPrintModal';
            modal.innerHTML = `
                <div class="bg-white dark:bg-slate-800 rounded-xl w-full max-w-lg shadow-2xl max-h-[90vh] overflow-auto">
                    <div class="flex justify-between items-center p-4 border-b dark:border-slate-700 sticky top-0 bg-white dark:bg-slate-800">
                        <h3 class="text-lg font-bold dark:text-white">🏷️ QRラベル印刷</h3>
                        <button onclick="closeLabelPrintModal()" class="text-2xl text-slate-400 hover:text-slate-600">&times;</button>
                    </div>
                    <div class="p-4">
                        <div class="mb-4">
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">印刷対象</label>
                            <select id="labelPrintTarget" class="w-full p-2 border dark:border-slate-600 rounded-lg dark:bg-slate-700 dark:text-white" onchange="updateLabelPreview()">
                                <option value="selected">選択中のアイテム (${selectedItems.size}件)</option>
                                <option value="instock">在庫中すべて</option>
                                <option value="waiting">入庫待ちすべて</option>
                                <option value="project">案件単位で選択</option>
                            </select>
                        </div>
                        <div id="projectSelector" class="mb-4 hidden">
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">案件を選択</label>
                            <select id="labelProjectSelect" class="w-full p-2 border dark:border-slate-600 rounded-lg dark:bg-slate-700 dark:text-white" onchange="updateLabelPreview()">
                                ${getProjectOptions()}
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">ラベルサイズ</label>
                            <select id="labelSize" class="w-full p-2 border dark:border-slate-600 rounded-lg dark:bg-slate-700 dark:text-white">
                                <option value="84x42" selected>83.8mm × 42.3mm（A4シート12面）</option>
                                <option value="29x90">29mm × 90mm（ブラザー標準）</option>
                                <option value="38x90">38mm × 90mm（大きめ）</option>
                                <option value="50x30">50mm × 30mm（正方形）</option>
                                <option value="62x29">62mm × 29mm（幅広）</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <p class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">プレビュー</p>
                            <div id="labelPreview" class="border dark:border-slate-600 rounded-lg p-4 bg-slate-50 dark:bg-slate-900 flex flex-wrap gap-2 justify-center">
                                <!-- プレビューがここに表示される -->
                            </div>
                            <p id="labelCount" class="text-xs text-slate-500 dark:text-slate-400 mt-2 text-center"></p>
                        </div>
                    </div>
                    <div class="p-4 border-t dark:border-slate-700 flex gap-3">
                        <button onclick="closeLabelPrintModal()" class="flex-1 py-2 border dark:border-slate-600 rounded-lg text-slate-600 dark:text-slate-400">キャンセル</button>
                        <button onclick="printLabels()" class="flex-1 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">🖨️ 印刷</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            // 初期プレビュー
            document.getElementById('labelPrintTarget').addEventListener('change', function() {
                document.getElementById('projectSelector').classList.toggle('hidden', this.value !== 'project');
            });
            updateLabelPreview();
        }
        
        function getProjectOptions() {
            const projects = {};
            inventory.forEach(item => {
                const pn = formatProjectNumber(item.orderPrefix, item.orderNumber);
                if (pn && !projects[pn]) {
                    projects[pn] = { count: 0 };
                }
                if (pn) projects[pn].count++;
            });
            
            return Object.entries(projects)
                .sort((a, b) => b[0].localeCompare(a[0]))
                .map(([pn, data]) => `<option value="${pn}">${pn} (${data.count}件)</option>`)
                .join('');
        }
        
        function updateLabelPreview() {
            const target = document.getElementById('labelPrintTarget').value;
            const items = getLabelTargetItems(target);
            const preview = document.getElementById('labelPreview');
            const countEl = document.getElementById('labelCount');
            
            if (items.length === 0) {
                preview.innerHTML = '<p class="text-slate-400 text-sm">対象アイテムがありません</p>';
                countEl.textContent = '';
                return;
            }
            
            // 最初の3件だけプレビュー
            const previewItems = items.slice(0, 3);
            preview.innerHTML = previewItems.map(item => {
                const pn = formatProjectNumber(item.orderPrefix, item.orderNumber) || '---';
                const qrContent = item.serial || pn || String(item.id);
                const qrDataUrl = generateQRDataURL(qrContent);
                return `
                    <div class="bg-white border rounded p-2 text-center" style="min-width: 100px;">
                        <img class="mx-auto mb-1" style="width:60px;height:60px;" src="${qrDataUrl}" alt="QR">
                        <p class="text-xs font-bold text-blue-600">${pn}</p>
                        <p class="text-xs font-mono truncate" style="max-width:90px;">${item.serial || '---'}</p>
                    </div>
                `;
            }).join('');
            
            countEl.textContent = `${items.length}件のラベルを印刷します` + (items.length > 3 ? '（プレビューは3件まで）' : '');
        }
        
        // QRコード生成（DataURL）
        function generateQRDataURL(content) {
            try {
                const qr = qrcode(0, 'M');
                qr.addData(content);
                qr.make();
                return qr.createDataURL(4, 0);
            } catch (e) {
                console.error('QR生成エラー:', e);
                return 'data:image/gif;base64,R0lGODlhAQABAIAAAMLCwgAAACH5BAAAAAAALAAAAAABAAEAAAICRAEAOw==';
            }
        }
        
        function getLabelTargetItems(target) {
            switch (target) {
                case 'selected':
                    return inventory.filter(i => selectedItems.has(String(i.id)));
                case 'instock':
                    return inventory.filter(i => i.status === '在庫中');
                case 'waiting':
                    return inventory.filter(i => i.status === '入庫待ち');
                case 'project':
                    const selectedProject = document.getElementById('labelProjectSelect')?.value;
                    return inventory.filter(i => formatProjectNumber(i.orderPrefix, i.orderNumber) === selectedProject);
                default:
                    return [];
            }
        }
        
        function closeLabelPrintModal() {
            const modal = document.getElementById('labelPrintModal');
            if (modal) modal.remove();
        }
        
        function printLabels() {
            const target = document.getElementById('labelPrintTarget').value;
            const items = getLabelTargetItems(target);
            const size = document.getElementById('labelSize').value;
            
            if (items.length === 0) {
                alert('印刷対象がありません');
                return;
            }
            
            // サイズ設定（mm）
            const sizes = {
                '84x42': { w: 83.8, h: 42.3, sheet: true, cols: 2, rows: 6 },
                '29x90': { w: 90, h: 29 },
                '38x90': { w: 90, h: 38 },
                '50x30': { w: 50, h: 30 },
                '62x29': { w: 62, h: 29 }
            };
            const labelSize = sizes[size];
            
            // 印刷データを準備（QRコードを事前生成）
            const printData = items.map(item => {
                const pn = formatProjectNumber(item.orderPrefix, item.orderNumber) || '---';
                const serial = item.serial || '---';
                const qrContent = item.serial || pn || String(item.id);
                return {
                    id: item.id,
                    serial: serial,
                    pn: pn,
                    qrDataUrl: generateQRDataURL(qrContent)
                };
            });
            
            // 印刷用HTMLを生成
            const printWindow = window.open('', '_blank');
            
            // A4シート印刷（12面）の場合
            if (labelSize.sheet) {
                const labelsPerPage = labelSize.cols * labelSize.rows; // 12
                const pages = [];
                for (let i = 0; i < printData.length; i += labelsPerPage) {
                    pages.push(printData.slice(i, i + labelsPerPage));
                }
                
                printWindow.document.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <title>QRラベル印刷</title>
                        <style>
                            @page { margin: 0; size: A4; }
                            * { box-sizing: border-box; }
                            body { margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
                            .page {
                                width: 210mm;
                                height: 297mm;
                                padding: 8.5mm 13.5mm;
                                page-break-after: always;
                            }
                            .page:last-child { page-break-after: auto; }
                            .grid {
                                display: grid;
                                grid-template-columns: repeat(${labelSize.cols}, ${labelSize.w}mm);
                                grid-template-rows: repeat(${labelSize.rows}, ${labelSize.h}mm);
                                gap: 0;
                            }
                            .label {
                                width: ${labelSize.w}mm;
                                height: ${labelSize.h}mm;
                                display: flex;
                                align-items: center;
                                padding: 3mm;
                                border: 0.5px dashed #ccc;
                            }
                            .qr-container {
                                flex-shrink: 0;
                                width: 32mm;
                                height: 32mm;
                            }
                            .qr-container img {
                                width: 100%;
                                height: 100%;
                            }
                            .text-container {
                                margin-left: 3mm;
                                overflow: hidden;
                                flex: 1;
                            }
                            .project-number {
                                font-size: 14pt;
                                font-weight: bold;
                                color: #1d4ed8;
                                margin: 0 0 2mm 0;
                            }
                            .serial {
                                font-size: 9pt;
                                font-family: monospace;
                                margin: 0;
                                color: #333;
                                word-break: break-all;
                            }
                            .empty { border: 0.5px dashed #eee; }
                            @media print {
                                .label { border: none; }
                                .empty { border: none; }
                            }
                        </style>
                    </head>
                    <body>
                        ${pages.map(pageItems => `
                            <div class="page">
                                <div class="grid">
                                    ${Array.from({length: labelsPerPage}, (_, idx) => {
                                        const item = pageItems[idx];
                                        if (item) {
                                            return `
                                                <div class="label">
                                                    <div class="qr-container">
                                                        <img src="${item.qrDataUrl}" alt="QR">
                                                    </div>
                                                    <div class="text-container">
                                                        <p class="project-number">${item.pn}</p>
                                                        <p class="serial">${item.serial}</p>
                                                    </div>
                                                </div>
                                            `;
                                        } else {
                                            return '<div class="label empty"></div>';
                                        }
                                    }).join('')}
                                </div>
                            </div>
                        `).join('')}
                        <script>
                            window.onload = function() {
                                setTimeout(() => window.print(), 200);
                            };
                        <\/script>
                    </body>
                    </html>
                `);
            } else {
                // 単票印刷（従来通り）
                printWindow.document.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <title>QRラベル印刷</title>
                        <style>
                            @page { margin: 0; size: ${labelSize.w}mm ${labelSize.h}mm; }
                            body { margin: 0; padding: 0; }
                            .label {
                                width: ${labelSize.w}mm;
                                height: ${labelSize.h}mm;
                                page-break-after: always;
                                display: flex;
                                align-items: center;
                                padding: 2mm;
                                box-sizing: border-box;
                                font-family: 'Arial', sans-serif;
                            }
                            .qr-container {
                                flex-shrink: 0;
                                width: ${Math.min(labelSize.h - 4, 25)}mm;
                                height: ${Math.min(labelSize.h - 4, 25)}mm;
                            }
                            .qr-container img {
                                width: 100%;
                                height: 100%;
                            }
                            .text-container {
                                margin-left: 2mm;
                                overflow: hidden;
                            }
                            .project-number {
                                font-size: ${labelSize.h > 30 ? '12pt' : '10pt'};
                                font-weight: bold;
                                color: #1d4ed8;
                                margin: 0;
                            }
                            .serial {
                                font-size: ${labelSize.h > 30 ? '9pt' : '7pt'};
                                font-family: monospace;
                                margin: 1mm 0 0 0;
                                color: #333;
                            }
                        </style>
                    </head>
                    <body>
                        ${printData.map(item => `
                            <div class="label">
                                <div class="qr-container">
                                    <img src="${item.qrDataUrl}" alt="QR">
                                </div>
                                <div class="text-container">
                                    <p class="project-number">${item.pn}</p>
                                    <p class="serial">${item.serial}</p>
                                </div>
                            </div>
                        `).join('')}
                        <script>
                            window.onload = function() {
                                setTimeout(() => window.print(), 200);
                            };
                        <\/script>
                    </body>
                    </html>
                `);
            }
            printWindow.document.close();
            
            closeLabelPrintModal();
        }
        
        // 単一アイテムのラベル印刷
        function printSingleLabel(itemId) {
            const item = inventory.find(i => String(i.id) === String(itemId));
            if (!item) return;
            
            // 一時的に選択状態にしてラベル印刷モーダルを開く
            selectedItems.clear();
            selectedItems.add(String(itemId));
            showLabelPrintModal();
        }

        // API読み込み確認と初期化
        function checkAndInit() {
            if (typeof gapi !== 'undefined' && typeof google !== 'undefined') {
                gapiLoaded();
                gisLoaded();
            } else {
                setTimeout(checkAndInit, 100);
            }
        }
        
        // DOM読み込み完了後に初期化
        document.addEventListener('DOMContentLoaded', checkAndInit);
    </script>

    <!-- トップへ戻るボタン -->
    <button id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})"
            class="fixed bottom-6 right-6 z-40 w-11 h-11 bg-slate-700 dark:bg-slate-600 text-white rounded-full shadow-lg flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 hover:bg-slate-800"
            title="トップへ戻る" aria-label="トップへ戻る">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" /></svg>
    </button>
    <script>
        (function() {
            const btn = document.getElementById('scrollTopBtn');
            if (!btn) return;
            window.addEventListener('scroll', () => {
                if (window.scrollY > 300) {
                    btn.classList.remove('opacity-0', 'pointer-events-none');
                    btn.classList.add('opacity-100');
                } else {
                    btn.classList.add('opacity-0', 'pointer-events-none');
                    btn.classList.remove('opacity-100');
                }
            }, { passive: true });
        })();
    </script>
</body>
</html>
